# K9-AIF - Core Orchestrator Registry (Config-driven imports)
# --------------------------------------------------------------
# Each orchestrator declares:
#   - name:  class name
#   - module: full module path
#   - intent: routing keyword
#   - description: optional
#   - domain/layer: classification

orchestrators:
  - name: IntentOrchestrator
    module: k9_aif_abb.k9_orchestrators.intent_orchestrator
    intent: _intent_resolution
    description: >
      OOB intent resolution orchestrator. Consumes intent.in, runs IntentSquad +
      K9IntentAgent to classify intent, then re-publishes to the correct domain
      topic or sends a "please clarify" response. Never wired in front of the
      Router — runs as a separate Kafka-decoupled process.
    domain: Intent Resolution
    layer: Routing

  - name: LiveAgentOrchestrator
    module: k9_aif_abb.k9_orchestrators.live_agent_orchestrator
    intent: talk_to_agent
    description: Escalates conversations to human support via external connectors.
    domain: Human Escalation
    layer: Integration

  - name: DiagnosticOrchestrator
    module: k9_aif_abb.k9_orchestrators.diagnostic_orchestrator
    intent: diagnostics
    description: Runs health checks and performance diagnostics on agents and buses.
    domain: Monitoring
    layer: Diagnostics

  - name: FallbackOrchestrator
    module: k9_aif_abb.k9_orchestrators.fallback_orchestrator
    intent: fallback
    description: Provides default responses for unsupported or unrecognized intents.
    domain: System Resilience
    layer: Recovery