# ABB-level configuration: defines reusable inference backends
# k9_aif_abb/config/config.yaml
# ============================================================
# NOTE:
# This config.yaml is part of the ABB (framework) repository.
# It provides default configuration for ABB testing and validation.
#
# - Factories (LLM, Connector, Persistence, Router, Security, Monitor)
#   use this config to demonstrate ABB behavior.
# - Values (Ollama, MCP, SQLite, etc.) are example defaults.
# - Solution-specific configurations (Acme, Medical, etc.)
#   MUST define their own config.yaml in their SBB repositories.
# ============================================================

# Enterprise policy — keys listed here cannot be overridden by SBB config or agent YAML.
# AgentLoader enforces this at merge time and logs a warning on any attempted override.
# Override: N semantics — locked keys hold the ABB value regardless of what the SBB sets.
_policy:
  locked: []   # e.g. [enable_zero_trust, security.shield.enabled, governance.enforce]

demo:
  # Default intent and query for sample/demo runs
  default_intent: "support"
  query: "What is K9-AIF and how do I try it?"


persistence:
  - name: sqlite
    class: k9_aif_abb.k9_core.persistence.base_persistence.SQLitePersistence
    kwargs:
      db_path: "./runtime/k9_aif_state.db"
  - name: memory
    class: k9_aif_abb.k9_core.persistence.base_persistence.MemoryPersistence
    kwargs: {}

monitors:
  - name: logger
    class: k9_aif_abb.k9_core.monitoring.logger_monitor.LoggerMonitor
    kwargs: {}

security:
  providers:
    - name: mock
      class: k9_aif_abb.k9_core.security.mock_auth.MockAuth
      kwargs: {}

  # k9x_Shield — Chain of Vulnerability Tests
  # Disabled by default in ABB. SBBs enable and configure in their own config.yaml.
  shield:
    enabled: false
    strict: false          # strict: true promotes FLAG → BLOCK across all checks
    fail_open: true        # fail_open: false promotes a crashing check's result
                            # from FLAG to BLOCK (fail-closed) instead of silently
                            # letting a broken check pass the payload through
    ingress:               # runs before the LLM — protect the model from what arrives
      checks:
        - InputSizeCheck
        - PromptInjectionCheck
        - PIIBoundaryCheck
    egress:                # runs after the LLM — inspect output before any tool executes
      checks:
        - SemanticDriftCheck
        - ToolArgumentCheck
        - ExecutionGuardCheck
        - PIIBoundaryCheck
    # check_config:         # optional per-check constructor overrides, keyed by
    #   InputSizeCheck:     # check class name — every OOB check accepts a config
    #     max_chars: 50000  # dict (thresholds, extra_patterns, block_on_match, ...)

    # Five additional OOB checks are registered but NOT enabled by default —
    # each needs solution-specific config to be useful (an approved-tool
    # allowlist, an agent's own system-prompt text, etc.), so adding them here
    # unconfigured would silently change behavior for every SBB that copies
    # this file. Opt in per solution by adding to ingress/egress checks above
    # plus the matching check_config entry:
    #   ToolAuthorizationCheck    — approved_tools / approved_backends allowlist
    #                               (LLM03/ASI04 — defaults to empty = deny-all)
    #   MemoryPoisoningCheck      — memory_ttl / tracked_fact_keys
    #                               (LLM04/ASI06 — fabricated/contradicted session facts)
    #   SystemPromptLeakageCheck  — system_prompt_fragments (your agents' own
    #                               role/goal text) / leakage_min_chars (LLM07)
    #   OutputSanitizationCheck   — block_on_output_markup (LLM05 — HTML/JS/
    #                               template injection in agent output)
    #   RequestFrequencyCheck     — max_requests_per_window / rate_limit_window_seconds
    #                               (LLM10 — per-session rate limiting)

governance:
  enabled: true
  policy_path: "k9_aif_abb/policies/governance.yaml"

vectordb:
  provider: chromadb
  path: "./data/chroma"
  db: k9-aif-chroma.db

retrieval:
  default_retriever: k9

  sources:
    default_docs:
      type: vectordb
      provider: chromadb
      path: "./data/chroma"
      collection: "k9_default_docs"
      top_k: 5

  routing:
    general_lookup:
      sources: [default_docs]

storage:
  backend: "file"
  file:
    root: "data/files"
  object:
    root: "data/objects"
  database:
    type: "memory"

logging:
  level: INFO
  
measurements:
  enabled: true

external_services:
  docling:
    endpoint: "${DOCLING_ENDPOINT:-http://localhost:5001/v1/parse}"

messaging:
  backend: redpanda
  broker_url: "${KAFKA_BROKER:-localhost:9092}"
  topic: k9aif-events
  group_id: k9aif-core       # [INFO] one canonical group for all orchestration logs
  client_id: k9aif-console   # optional metadata only
  security_protocol: PLAINTEXT
  auto_create: true

# ------------------------------------------------------------
# K9 Event Routing
# ------------------------------------------------------------
# K9EventRouter publishes to domain topics when event_type is
# in the table; falls back to intent_topic when unknown.
# IntentOrchestrator consumes intent_topic, classifies intent,
# and re-publishes to the resolved domain topic — or sends a
# "please clarify" to response_topic.
# SBBs override table entries in their own config.yaml.
# ------------------------------------------------------------
routing:
  intent_topic:        intent.in      # Router → IntentOrchestrator handoff
  response_topic:      responses.out  # IntentOrchestrator → clarification replies
  confidence_threshold: 0.6           # below this → ask for clarification
  table: {}                           # event_type/intent → topic; SBBs fill this in

  # intent_map passed through to K9IntentAgent (fast-path rule lookup, no LLM):
  # intent_map:
  #   fraud_report: fraud
  #   claim_form:   claims

postgres:
  host:     "${POSTGRES_HOST:-localhost}"
  port:     "${POSTGRES_PORT:-5432}"
  user:     "${POSTGRES_USER:-postgres}"
  password: "${POSTGRES_PASSWORD:-postgres}"
  database: "${POSTGRES_DB:-k9aif}"
  schema:   "${POSTGRES_SCHEMA:-k9aif}"

# ------------------------------------------------------------
# K9 Inference Router
# ------------------------------------------------------------

inference:

  router:
    type: k9_model_router
    default_model: general

    persistence:
      enabled: true
      provider: sqlite  # sqlite | postgres | memory

      sqlite:
        db_path: "./runtime/k9_model_router.db"

      postgres:
        host:     "${POSTGRES_HOST:-localhost}"
        port:     "${POSTGRES_PORT:-5432}"
        user:     "${POSTGRES_USER:-postgres}"
        password: "${POSTGRES_PASSWORD:-postgres}"
        database: "${POSTGRES_DB:-k9aif}"
        schema:   "${POSTGRES_SCHEMA:-k9aif}"
        schema_file: "k9_aif_abb/db/k9_db_schema.sql"

  llm_factory:
    base_url: "${OLLAMA_BASE_URL:-http://localhost:11434}"
    models:
      general: "llama3.2:1b"
      fast_local: "llama3.2:1b"
      enterprise: "llama3.2:1b"

  models:
    general:
      provider: ollama
      llm_ref: general
      capabilities: [general, reasoning]

    fast_local:
      provider: ollama
      llm_ref: fast_local
      capabilities: [summarization, chat]

    enterprise:
      provider: ollama
      llm_ref: enterprise
      capabilities: [enterprise, confidential]