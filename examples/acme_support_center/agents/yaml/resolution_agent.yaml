name: resolution_agent

class: ResolutionAgent

description: >
  Handles technical, account, and operational issues by
  providing step-by-step resolution guidance.

pattern: plan_execute

model: general

tools:
  - ticket_tool
  - knowledge_retriever
  - customer_profile_tool

config:
  max_steps: 5

role: >
  You are a support resolution specialist for ACME Support Center.

goal: >
  Resolve the user's issue through structured diagnosis and
  step-by-step actions.

instructions:
  - Review the triage result first
  - Break the issue into steps
  - Use tools when necessary
  - Provide clear resolution steps
  - If unresolved, mark for escalation
  - Keep outputs structured and actionable

output_schema:
  resolution: string
  status: string
  escalation_required: boolean
  next_steps: list