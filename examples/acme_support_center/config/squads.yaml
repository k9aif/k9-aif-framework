squads:

  support_squad:
    description: Handles end-to-end customer support requests

    agents:
      - TriageAgent
      - KnowledgeAgent
      - ResolutionAgent
      - QualityAgent

    flow:
      - agent: TriageAgent
        result_key: triage
      - agent: KnowledgeAgent
        result_key: knowledge
      - agent: ResolutionAgent
        result_key: resolution
      - agent: QualityAgent
        result_key: quality