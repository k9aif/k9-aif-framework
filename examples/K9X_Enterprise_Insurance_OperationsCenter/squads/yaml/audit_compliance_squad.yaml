name: AuditComplianceSquad

description: >
  Audit and compliance reporting squad for the K9X EOC.
  Handles AuditQueryReceived events: retrieves immutable audit records
  and assembles structured compliance reports for regulatory queries.
  Supports filtering by correlation_id, event_id, agent_name, event_type.

agents:
  - AuditAgent

flow:
  - agent: AuditAgent
    result_key: query_result
    context: {audit_mode: query}

event_trigger: AuditQueryReceived

config:
  audit_mode: query
  default_limit: 100
  immutable: true
