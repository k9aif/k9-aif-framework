name: CustomerServiceSquad

description: >
  Customer service squad for the K9X EOC.
  Handles CustomerInteractionLogged events: customer intent classification,
  PII and policy governance guard, audit trail, and conditional HITL
  escalation for unresolvable or sensitive customer interactions.

agents:
  - ClaimsTriageAgent
  - GuardAgent
  - AuditAgent
  - EscalationAgent

flow:
  - agent: ClaimsTriageAgent
    result_key: intent
  - agent: GuardAgent
    result_key: guard
    context: {guard_mode: pre}
  - agent: AuditAgent
    result_key: audit
  - agent: EscalationAgent
    result_key: escalation
    when:
      any:
        - {key: "intent.confidence", lt: 0.75}
        - {key: "guard.passed", eq: false}

event_trigger: CustomerInteractionLogged

config:
  confidence_threshold: 0.75
  escalation_on_low_confidence: true
  escalation_on_guard_fail: true
