name: ClaimsProcessingSquad

description: >
  End-to-end claims processing squad for the K9X Enterprise Insurance
  Operations Center. Handles claim submission events: triage, adjudication,
  governance guard, audit trail, and conditional HITL escalation.

agents:
  - ClaimsTriageAgent
  - AdjudicationAgent
  - GuardAgent
  - AuditAgent
  - EscalationAgent

flow:
  - agent: ClaimsTriageAgent
    result_key: triage
  - agent: AdjudicationAgent
    result_key: adjudication
  - agent: GuardAgent
    result_key: guard
    context: {guard_mode: post}
  - agent: AuditAgent
    result_key: audit
  - agent: EscalationAgent
    result_key: escalation
    when:
      any:
        - {key: "adjudication.decision", eq: "escalate"}
        - {key: "adjudication.confidence", lt: 0.75}
        - {key: "guard.passed", eq: false}

event_trigger: ClaimSubmitted

config:
  confidence_threshold: 0.75
  escalation_on_low_confidence: true
  escalation_on_guard_fail: true
