name: RiskAssessmentSquad

description: >
  Fraud risk assessment squad for the K9X EOC.
  Handles FraudSignalRaised events: multi-signal fraud correlation,
  governance validation, audit trail, and auto-escalation for
  signals with risk score >= 0.8.

agents:
  - FraudDetectionAgent
  - GuardAgent
  - AuditAgent
  - EscalationAgent

flow:
  - agent: FraudDetectionAgent
    result_key: fraud_assessment
  - agent: GuardAgent
    result_key: guard
    context: {guard_mode: post}
  - agent: AuditAgent
    result_key: audit
  - agent: EscalationAgent
    result_key: escalation
    when:
      any:
        - {key: "fraud_assessment.risk_score", gte: 0.8}
        - {key: "guard.passed", eq: false}

event_trigger: FraudSignalRaised

config:
  escalation_risk_threshold: 0.8
  escalation_on_guard_fail: true
