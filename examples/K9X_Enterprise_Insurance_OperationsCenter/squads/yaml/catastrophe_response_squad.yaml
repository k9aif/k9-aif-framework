name: CatastropheResponseSquad

description: >
  Catastrophe response squad for the K9X EOC.
  Handles CatastropheAlertIssued events: multi-policy exposure/impact
  assessment using the FraudDetectionAgent repurposed for risk signal
  analysis, followed by immutable audit trail.

agents:
  - FraudDetectionAgent
  - AuditAgent

flow:
  - agent: FraudDetectionAgent
    result_key: impact_assessment
  - agent: AuditAgent
    result_key: audit

event_trigger: CatastropheAlertIssued

config:
  impact_analysis_mode: exposure
  auto_escalate: true
