name: DocumentIntelligenceSquad

description: >
  Document ingestion and intelligence squad for the K9X EOC.
  Handles document receipt events: OCR extraction, PII governance guard,
  Neo4j entity graph synchronization, and immutable audit trail.

agents:
  - DocumentExtractorAgent
  - GuardAgent
  - GraphSyncAgent
  - AuditAgent

flow:
  - agent: DocumentExtractorAgent
    result_key: extraction
  - agent: GuardAgent
    result_key: guard
    context: {guard_mode: post}
  - agent: GraphSyncAgent
    result_key: graph_sync
    context: {event_type: document_received}
  - agent: AuditAgent
    result_key: audit

event_trigger: DocumentReceived

config:
  ocr_enabled: true
  graph_sync_enabled: true
  pii_check_required: true
