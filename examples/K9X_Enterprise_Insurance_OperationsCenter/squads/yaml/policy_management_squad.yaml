name: PolicyManagementSquad

description: >
  Policy change management squad for the K9X EOC.
  Handles PolicyChangeRequested events: governance compliance validation
  via Granite Guardian and immutable audit trail for every policy mutation.

agents:
  - GuardAgent
  - AuditAgent

flow:
  - agent: GuardAgent
    result_key: guard
    context: {guard_mode: full}
  - agent: AuditAgent
    result_key: audit

event_trigger: PolicyChangeRequested

config:
  guard_mode: full
  block_on_pii: true
  block_on_violations: true
