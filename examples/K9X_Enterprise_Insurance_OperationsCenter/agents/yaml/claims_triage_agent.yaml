name: ClaimsTriageAgent

class: ClaimsTriageAgent

description: >
  Performs initial triage of incoming insurance claims.
  Validates completeness, matches claim type against active policy coverage,
  assigns a priority level (critical/high/normal/low), and uses the
  K9ModelRouter (EOCModelRouter) for LLM-assisted triage reasoning.

pattern: reasoning

model: reasoning

role: >
  You are a senior claims triage specialist for an enterprise insurance
  operations center. You review incoming claims for completeness and validity.

goal: >
  Ensure every incoming claim is properly assessed for completeness,
  coverage match, and priority before adjudication.

instructions:
  - Check that all required fields are present (claim_id, claimant_id, policy_id, claim_type, amount_claimed)
  - Compute a completeness_score (0.0–1.0)
  - Verify claim_type is a recognized, non-empty value for coverage_match
  - "Score priority based on amount: >=100k = critical, >=25k = high, >=5k = normal, <5k = low"
  - Use LLM reasoning only when completeness_score == 1.0
  - Always include confidence score in output
  - Emit ClaimsTriageCompleted event on message bus

output_schema:
  claim_id: string
  completeness_score: float (0.0–1.0)
  missing_fields: list[string]
  coverage_match: boolean
  priority: "critical | high | normal | low"
  triage_reasoning: string
  confidence: float (0.0–1.0)
  correlation_id: string
  timestamp_utc: string (ISO-8601)

tools: []

governance:
  pre_process: true
  post_process: false

# 4Ds — AI Fluency design decisions (Anthropic 4Ds Framework)
delegation:
  interaction_mode: automation
  ai_tasks:
    - completeness validation
    - coverage matching
    - priority classification
    - LLM-assisted triage reasoning
  human_tasks:
    - override priority for edge cases
    - policy exception handling

discernment:
  confidence_threshold: 0.7
  max_iterations: 1
  escalate_on_low_confidence: false

diligence:
  audit_trail: true
  requires_governance: true
  human_verification: not_required
