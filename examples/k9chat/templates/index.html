<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K9Chat</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>K9Chat</h1>
        <p class="subtitle">K9-AIF Example Chat Interface</p>
      </div>
      <div class="badge-group">
        <div class="badge">Provider: {{ provider }}</div>
        <div class="badge">Model: {{ model }}</div>
        <div class="badge">Host: {{ base_url }}</div>
      </div>
    </header>

    <main class="chat-panel">
      <div id="chat-history" class="chat-history">
        <div class="message assistant">
          <div class="bubble">
            Hello. K9Chat is ready.
          </div>
        </div>
      </div>

      <div class="input-panel">
        <textarea id="message-input" placeholder="Type your message here..."></textarea>
        <div class="button-row">
          <button id="send-btn">Send</button>
          <button id="clear-btn" class="secondary">Clear</button>
        </div>
      </div>
    </main>
  </div>

  <script>
    const chatHistory = document.getElementById("chat-history");
    const messageInput = document.getElementById("message-input");
    const sendBtn = document.getElementById("send-btn");
    const clearBtn = document.getElementById("clear-btn");

    function appendMessage(role, text) {
      const wrapper = document.createElement("div");
      wrapper.className = `message ${role}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;

      wrapper.appendChild(bubble);
      chatHistory.appendChild(wrapper);
      chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    let streamEnabled = false;
    fetch("/chat/config").then(r => r.json()).then(cfg => { streamEnabled = !!cfg.stream; });

    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      appendMessage("user", text);
      messageInput.value = "";
      sendBtn.disabled = true;
      sendBtn.textContent = "Sending...";

      try {
        if (streamEnabled) {
          await sendMessageStreaming(text);
        } else {
          const response = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text })
          });
          const data = await response.json();
          appendMessage("assistant", data.reply || "");
        }
      } catch (error) {
        appendMessage("assistant", "Error: unable to reach K9Chat backend.");
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = "Send";
      }
    }

    async function sendMessageStreaming(text) {
      // Create an empty assistant bubble, fill it as chunks arrive
      const wrapper = document.createElement("div");
      wrapper.className = "message assistant";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      wrapper.appendChild(bubble);
      chatHistory.appendChild(wrapper);

      const response = await fetch("/chat/stream", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      });

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let fullText = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        const lines = buffer.split("\n\n");
        buffer = lines.pop();  // keep incomplete trailing chunk

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const data = JSON.parse(line.slice(6));
          if (data.chunk) {
            fullText += data.chunk;
            bubble.textContent = fullText;
            chatHistory.scrollTop = chatHistory.scrollHeight;
          }
          if (data.done) return;
        }
      }
    }

    sendBtn.addEventListener("click", sendMessage);

    messageInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    clearBtn.addEventListener("click", function() {
      chatHistory.innerHTML = `
        <div class="message assistant">
          <div class="bubble">
            Hello. K9Chat is ready.
          </div>
        </div>
      `;
      messageInput.value = "";
    });
  </script>
</body>
</html>
