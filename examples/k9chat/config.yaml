chat:
  stream: true   # config-driven — set false for non-streaming (full response) chat

guardrails:
  enabled: false   # set true once the guardian model below is pulled
  model_alias: guardian
  fail_closed: false   # if the guardian call errors, allow the message through (true = block)
  refusal_message: "I can't help with that request."

inference:

  router:
    type: k9

  llm_factory:
    provider: ollama
    base_url: "${OLLAMA_BASE_URL:-http://localhost:11434}"

    models:
      general: llama3.2:1b
      guardian: "${K9CHAT_GUARDIAN_MODEL:-granite3-guardian:2b}"

  model_catalog:
    default_model: general

    models:
      general:
        provider: ollama
        llm_ref: general
        capabilities: [chat]
      guardian:
        provider: ollama
        llm_ref: guardian
        capabilities: [guardrails]