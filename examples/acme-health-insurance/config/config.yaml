# Acme Health Insurance Experience Center — Configuration

inference:
  llm_factory:
    backend: ollama
    provider: "ollama"
    base_url: "http://192.168.1.98:11434"
    models:
      guardian: "granite3-guardian:latest"
      code: "granite3-dense:2b"
      general: "llama3.1:latest"

retriever:
  sources:
    - name: acme_vector
      type: vector
      enabled: true
      store: chromadb
      collection: acme_health_knowledge
    - name: acme_sql
      type: sql
      enabled: true
      db: acme_db
      table: PLAN_MASTER
    - name: acme_text
      type: file
      enabled: true
      path: "./k9_projects/acme_health_insurance/data/knowledge/"

agents:
  eligibility_agent:
    model: "general"
  claim_processing_agent:
    model: "general"
  policy_advisor_agent:
    model: "guardian"
  notification_agent:
    model: "code"
  monitor_agent:
    model: "guardian"

monitoring:
  console: true
  log_level: INFO

logging:
  level: DEBUG
  color: true
  dir: logs/acme_health_insurance

persistence:
  db_path: k9_projects/acme_health_insurance/acme_health_insurance.db

messaging:
  backend: kafka
  brokers:
    - 192.168.1.98:9092
  topic: acme-events
  client_id: acme-console
  security_protocol: PLAINTEXT

governance:
  enabled: true
  policy_path: k9_aif_abb/policies/governance.yaml

flows:
  path: k9_projects/acme_health_insurance/config/flows.yaml
