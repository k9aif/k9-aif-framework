<!-- K9-AIF™ — ACME HealthCare Sign-In -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — ACME HealthCare</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-50 flex items-center justify-center min-h-screen">
  <div class="bg-white shadow-lg rounded-xl p-8 w-full max-w-md">
    <h1 class="text-2xl font-semibold text-blue-800 mb-6 text-center">
      Sign in to ACME HealthCare
    </h1>

    <form action="/api/signin" method="POST" class="space-y-4">
      <input type="text" name="username" placeholder="Username"
             class="w-full border p-3 rounded focus:outline-none" required />

      <input type="password" name="password" placeholder="Password"
             class="w-full border p-3 rounded focus:outline-none" required />

      <select name="role" class="w-full border p-3 rounded">
        <option value="member">Member</option>
        <option value="provider">Provider</option>
        <option value="employer">Employer</option>
      </select>

      <button type="submit"
              class="w-full bg-blue-700 text-white py-3 rounded hover:bg-blue-800 transition">
        Sign In
      </button>
    </form>

    <p class="text-sm text-center mt-4 text-gray-600">
      Don’t have an account?
      <a href="/register" class="text-blue-700 font-semibold hover:underline">Register</a>
    </p>
  </div>
</body>
</html>
