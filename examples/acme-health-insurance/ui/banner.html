<!-- K9-AIF™ — Acme Health Insurance Experience Center Banner -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acme Health Insurance | Experience Center</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome for Icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
</head>

<body class="bg-white text-gray-800">

  <!-- 🩺 Acme Health Insurance Banner -->
  <header class="bg-white border-b border-blue-200 shadow-sm">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between px-6 py-4">

      <!-- Left Section: Logo + Title -->
      <div class="flex items-center space-x-3">
        <img src="assets/img/acme_logo_banner.png"
             alt="Acme Health Insurance"
             class="h-10 w-auto" />
        <div>
          <h1 class="text-2xl font-bold text-blue-800 leading-tight">
            Health Insurance
          </h1>
          <p class="text-blue-500 text-sm font-medium">
            We provide the best services for you
          </p>
        </div>
      </div>

      <!-- Right Section: Icons + Social -->
      <div class="flex space-x-6 mt-4 md:mt-0">

        <!-- Feature Icons -->
        <div class="grid grid-cols-2 gap-4">
          <div class="flex flex-col items-center">
            <div class="bg-blue-100 p-3 rounded-full">
              <i class="fa-solid fa-user-md text-blue-700 text-xl"></i>
            </div>
            <span class="text-xs mt-2 text-blue-800 font-medium">Find a Doctor</span>
          </div>
          <div class="flex flex-col items-center">
            <div class="bg-blue-100 p-3 rounded-full">
              <i class="fa-solid fa-file-medical text-blue-700 text-xl"></i>
            </div>
            <span class="text-xs mt-2 text-blue-800 font-medium">Claims</span>
          </div>
          <div class="flex flex-col items-center">
            <div class="bg-blue-100 p-3 rounded-full">
              <i class="fa-solid fa-heart-pulse text-blue-700 text-xl"></i>
            </div>
            <span class="text-xs mt-2 text-blue-800 font-medium">Coverage</span>
          </div>
          <div class="flex flex-col items-center">
            <div class="bg-blue-100 p-3 rounded-full">
              <i class="fa-solid fa-phone text-blue-700 text-xl"></i>
            </div>
            <span class="text-xs mt-2 text-blue-800 font-medium">Support</span>
          </div>
        </div>

        <!-- Social Links -->
        <div class="flex flex-col items-center ml-8">
          <span class="text-xs text-gray-600 mb-1">Your account</span>
          <div class="flex space-x-3">
            <a href="#" class="text-blue-600 hover:text-blue-800"><i class="fab fa-facebook-f"></i></a>
            <a href="#" class="text-blue-600 hover:text-blue-800"><i class="fab fa-instagram"></i></a>
            <a href="#" class="text-blue-600 hover:text-blue-800"><i class="fab fa-x-twitter"></i></a>
          </div>
        </div>
      </div>
    </div>
  </header>

</body>
</html>
